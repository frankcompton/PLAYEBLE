<html>
   <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Playable</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="gameScaler">
        <div id="game">
            <div id="fxLayer"></div>
            <div id="topWinPanel">0 A$</div>

            <div id="slotStage">
                <img id="gameLogo" alt="Coin Strike">

                <div id="slotArea">
                    <div id="reels">
                        <div class="reel">
                            <div class="reel-strip"></div>
                        </div>

                        <div class="reel">
                            <div class="reel-strip"></div>
                        </div>

                        <div class="reel">
                            <div class="reel-strip"></div>
                        </div>
                    </div>
                </div>
            </div>

            <button id="spinBtn">
                <span id="spinText">SPIN</span>
            </button>
        </div>
    </div>

    <div id="overlay"></div>

    <div id="ctaPopup">
        <div id="ctaTitle">BIG WIN!</div>
        <div id="ctaAmount">10 350 A$</div>
        <button id="ctaButton">CLAIM BONUS</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pixi.js@8.18.1/dist/pixi.min.js"></script>
    <script src="config.js"></script>
    <script src="fx.js"></script>
    <script src="script.js"></script>
</body>
</html>
