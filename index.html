<html>

<head>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="logo">
        SUPER SLOT
    </div>

    <div id="slotArea">

        <div id="slotTitle">
            COIN STRIKE1
        </div>

        <div id="reels">
            <div class="symbol">
                <span class="symbol-icon">💎</span>
            </div>

            <div class="symbol">
                <span class="symbol-icon">🍒</span>
            </div>

            <div class="symbol">
                <span class="symbol-icon">⭐</span>
            </div>
        </div>

        <div id="slotWin">
            $0
        </div>

    </div>

    <button id="spinBtn">
        SPIN
    </button>
    <div id="overlay"></div>
    <div id="ctaPopup">

        <div id="ctaTitle">
            BIG WIN!
        </div>

        <div id="ctaAmount">
            $10,000
        </div>

        <div id="ctaButton">
            CLAIM YOUR BONUS
        </div>

    </div>
    <script src="script.js"></script>
</body>

</html>
