<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Playable</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="preloader">
        <div id="preloaderContent">
            <img id="preloaderLogo" alt="Loading">
            <div id="preloaderBar">
                <div id="preloaderProgress"></div>
            </div>
        </div>
    </div>

    <div id="fxLayer"></div>
    <div id="gameScaler">
        <div id="game">
            <div id="topWinPanel"><span id="topWinPanelText">0 A$</span></div>

            <div id="slotStage">
                <img id="gameLogo" alt="Coin Strike">

                <div id="slotArea">
                    <div id="reels">
                        <div>
                            <div></div>
                        </div>

                        <div>
                            <div></div>
                        </div>

                        <div>
                            <div></div>
                        </div>
                    </div>
                </div>
            </div>

            <button id="spinBtn">
                <span id="spinText">SPIN</span>
            </button>
        </div>
    </div>

    <div id="overlay"></div>

    <div id="ctaPopup">
        <div id="ctaTitle">BIG WIN!</div>
        <div id="ctaAmount">10 350 A$</div>
        <button id="ctaButton">CLAIM BONUS</button>
    </div>

    <script src="assets/pixi.min.js"></script>
    <script type="module" src="main.js"></script>
</body>

</html>
